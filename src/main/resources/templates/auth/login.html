<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments/head :: head(#{login.title}, ~{::link}, ~{::script})}">
    <link rel="stylesheet" href="#" th:if="${false}" />
      <link rel="stylesheet" th:href="@{/css/login.css}">
    <script src="#" th:if="${false}"></script>
  </head>
  <body class="login-page">
  <main class="main login-center-layout">

      <div class="login-box">

          <div class="login-header">
              <h1 class="login-logo">
                  <a th:href="@{/}" class="logo-link">EnLink</a>
              </h1>
              <p th:text="#{member.login.welcome}">다시 오신 것을 환영합니다</p>
          </div>

          <form th:action="@{/login}" method="post">

              <div class="input-group">
                  <label for="memberId" th:text="#{member.label.id}">아이디</label>
                  <div class="input-wrapper">
                      <i class="bi bi-person"></i>
                      <input type="text" id="memberId" name="memberId"
                             maxlength="20" th:placeholder="#{member.label.id.placeholder}" required>
                  </div>
              </div>

              <div class="input-group">
                  <label for="password" th:text="#{member.label.password}">비밀번호</label>
                  <div class="input-wrapper">
                      <i class="bi bi-lock"></i>
                      <input type="password" id="password" name="password"
                             maxlength="100" th:placeholder="#{member.label.password.placeholder}" required>
                  </div>
              </div>

              <div th:if="${param.error}" class="error-container">
                  <i class="bi bi-exclamation-circle"></i>
                  <span th:text="#{member.login.error}">일치하는 정보가 없습니다.</span>
              </div>

              <button type="submit" class="login-submit-btn" th:text="#{common.btn.login}">로그인</button>

          </form>

          <div class="login-helper">
              <th:block th:text="#{member.login.noAccount}">계정이 없으신가요?</th:block>
              <a th:href="@{/members/signup}" th:text="#{common.btn.signup}">회원가입</a>
          </div>

      </div>

  </main>

  <footer th:replace="~{fragments/footer :: footer}"></footer>
  </body>
</html>
