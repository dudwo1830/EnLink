<!doctype html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head
    th:replace="~{fragments/head :: head('EnLink - 모임 상세 정보', ~{::link}, ~{::script})}"
  >
    <link rel="stylesheet" th:href="@{/css/club/clubDetail.css}" />
  </head>
  <body>
    <div class="grid-container club-detail-page">
      <header
        th:replace="~{fragments/header :: header}"
        class="header shadow-sm"
      ></header>
      <aside th:replace="~{fragments/aside :: aside}" class="aside"></aside>

      <main class="main">
        <div class="club-shell" th:if="${club != null}">
          <div th:replace="fragments/clubTabs :: clubTabs('home')"></div>

    <main class="main">
        <div class="cd-full-width-container" th:if="${club != null}"> <div class="detail-content-container bg-white">
            <div th:replace="fragments/clubTabs :: clubTabs('home')"></div>

            <div th:if="${club.status == 'DELETED_PENDING'}" class="delete-wait-banner">
                <div class="delete-wait-content">
                    <span class="delete-wait-icon">📢</span>
                    <div class="delete-wait-info">
                        <h5 class="delete-wait-title">모임 삭제 대기 안내</h5>
                        <p class="delete-wait-desc">현재 이 모임은 삭제 절차 진행 중입니다. 멤버 가입 및 활동이 제한됩니다.</p>
                    </div>
                </div>
                <div class="delete-wait-timer">
                    남은 시간: <strong th:text="${club.remainingTime}">7일</strong>
                </div>
            </div>

            <div class="cd-slim-cover mt-3">
              <img
                th:src="${club.imageUrl}"
                class="cd-cover-img"
                onerror="this.src = '/images/default_club.jpg'"
              />
            </div>

            <div class="cd-info-content-area py-4">
              <div class="d-flex align-items-center gap-4 mb-4">
                <div class="cd-profile-circle shadow-sm">
                  <img
                    th:src="${club.imageUrl}"
                    onerror="this.src = '/images/default_club.jpg'"
                  />
                </div>
                <div class="cd-info-main">
                  <h1
                    class="fw-bold mb-2 display-6"
                    th:text="${club.name ?: '모임 이름 없음'}"
                  >
                    모임명
                  </h1>
                  <div class="d-flex align-items-center gap-2 mb-2">
                    <span
                      class="badge rounded-pill bg-light text-primary border border-primary px-3 py-1"
                      th:text="${club.topicName ?: '주제 없음'}"
                      >주제</span
                    >
                    <span class="text-secondary small">
                      <i class="bi bi-geo-alt-fill me-1 text-danger"></i>
                      <span th:text="${club.cityName ?: '전국'}">지역</span>
                    </span>
                    <span class="text-muted ms-2 small">
                      <i class="bi bi-people-fill me-1"></i> 멤버
                      <strong
                        class="text-primary"
                        th:text="${club.currentMemberCount ?: 1}"
                        >1</strong
                      >
                      / <span th:text="${club.maxMember ?: 30}">30</span>명
                    </span>
                  </div>
                </div>
              </div>

              <div class="club-description-box p-4 rounded-4 mb-5">
                <p class="fw-bold mb-3 text-dark fs-5">
                  <i class="text-primary"></i>모임 소개
                </p>
                <p
                  th:text="${club.description ?: '소개글이 없습니다.'}"
                  class="text-muted mb-0 lh-lg"
                  style="white-space: pre-wrap; word-break: break-all"
                ></p>
              </div>

              <div class="join-section text-start mb-5">
                <th:block th:if="${!isLogin}">
                  <a
                    th:href="@{/auth/login}"
                    class="btn btn-primary px-4 py-2 shadow-sm rounded-pill"
                    >로그인하고 가입하기</a
                  >
                </th:block>

                <th:block th:if="${isLogin}">
                  <th:block
                    th:if="${loginMember != null and loginMember.status == 'ACTIVE'}"
                  >
                    <span
                      th:if="${loginMember.role == 'OWNER'}"
                      class="badge bg-primary p-3 fs-6 rounded-3 shadow-sm"
                      >👑 모임장입니다</span
                    >
                    <button
                      th:if="${loginMember.role != 'OWNER'}"
                      type="button"
                      class="btn btn-danger px-4 py-2 shadow-sm rounded-pill"
                      onclick="openLeaveModal()"
                    >
                      모임 탈퇴하기
                    </button>
                  </th:block>

                  <th:block
                    th:if="${loginMember != null and loginMember.status == 'PENDING'}"
                  >
                    <button
                      type="button"
                      class="btn btn-warning px-4 py-2 fw-bold rounded-pill"
                      th:onclick="|cancelApply(${club.clubId})|"
                    >
                      가입 신청 취소
                    </button>
                  </th:block>

                  <th:block
                    th:if="${loginMember == null or loginMember.status == 'EXIT' or loginMember.status == 'BANNED'}"
                  >
                    <button
                      th:if="${canJoin}"
                      type="button"
                      class="btn btn-primary px-5 py-3 fw-bold shadow rounded-pill"
                      onclick="openApplyModal()"
                    >
                      가입 신청하기
                    </button>
                    <div
                      th:if="${!canJoin}"
                      class="badge bg-secondary p-2 mt-2 rounded-pill small text-white"
                    >
                      최대 5개 모임 참여 제한
                    </div>
                    <div class="cd-info-main">
                        <h1 class="fw-bold mb-2 display-6" th:text="${club.name ?: '모임 이름 없음'}">모임명</h1>
                        <div class="d-flex align-items-center gap-2 mb-2">
                                <span class="badge rounded-pill bg-light text-primary border border-primary px-3 py-1"
                                      th:text="${club.topicName ?: '주제 없음'}">주제</span>
                            <span class="text-secondary small">
                                    <i class="bi bi-geo-alt-fill me-1 text-danger"></i>
                                    <span th:text="${club.cityName ?: '전국'}">지역</span>
                                </span>
                            <span class="text-muted ms-2 small">
                                    <i class="bi bi-people-fill me-1"></i> 멤버
                                    <strong class="text-primary" th:text="${club.currentMemberCount ?: 1}">1</strong> /
                                    <span th:text="${club.maxMember ?: 30}">30</span>명
                                </span>
                        </div>
                    </div>
                </div>

                <div class="club-description-box p-4 rounded-4 mb-5">
                    <p class="fw-bold mb-3 text-dark fs-5"><i class="text-primary"></i>모임 소개</p>
                    <p th:text="${club.description ?: '소개글이 없습니다.'}"
                       class="text-muted mb-0 lh-lg"
                       style="white-space: pre-wrap; word-break: break-all;"></p>
                </div>

                <div class="join-section text-start mb-5">
                    <th:block th:if="${!isLogin}">
                        <a th:href="@{/auth/login}" class="btn btn-primary-custom">로그인하고 가입하기</a>
                    </th:block>

                    <th:block th:if="${isLogin}">
                        <th:block th:if="${loginMember != null and loginMember.status == 'ACTIVE'}">
                            <div th:if="${loginMember.role == 'OWNER'}" class="owner-status-badge">
                                <i class="bi bi-patch-check-fill"></i>
                                <span>이 모임의 관리자입니다</span>
                            </div>

                            <button th:if="${loginMember.role != 'OWNER'}" type="button" class="btn btn-danger-custom" onclick="openLeaveModal()">모임 탈퇴하기</button>
                        </th:block>

                        <th:block th:if="${loginMember != null and loginMember.status == 'PENDING'}">
                            <button type="button" class="btn btn-warning-custom" th:onclick="|cancelApply(${club.clubId})|">가입 신청 취소</button>
                        </th:block>
                    </th:block>

                        <th:block th:if="${loginMember == null or loginMember.status == 'EXIT' or loginMember.status == 'BANNED'}">
                            <button th:if="${canJoin}" type="button" class="btn btn-primary px-5 " onclick="openApplyModal()">가입 신청하기</button>
                            <div th:if="${!canJoin}" class="badge bg-secondary p-2 mt-2 rounded-pill small text-white">최대 5개 모임 참여 제한</div>
                        </th:block>
                    </th:block>
                </div>

                <div class="member-list-section">
                    <h5 class="fw-bold mb-4 text-dark">
                        <i class="bi bi-person-badge-fill me-2 text-primary"></i>
                        멤버 목록 (<span th:text="${members != null ? members.size() : 0}">0</span>명)
                    </h5>

                    <div class="list-group list-group-flush" th:if="${members != null}">
                        <div th:each="member : ${members}" class="member-item">
                            <div class="member-profile-info">
                                <div class="member-base-info">
                                    <strong class="member-name-text" th:text="${member.memberName}">이름</strong>
                                    <span class="member-id-text" th:text="'@' + ${member.memberId}">아이디</span>
                                </div>

                                <div class="member-role-group">
                    <span class="role-icon-small">
                        <th:block th:if="${member.role == 'OWNER'}">👑</th:block>
                        <th:block th:if="${member.role == 'MANAGER'}">⭐</th:block>
                        <th:block th:if="${member.role == 'MEMBER'}"></th:block>
                    </span>
                                    <span class="badge-role-inline"
                                          th:classappend="${member.role == 'OWNER' ? 'role-owner' : (member.role == 'MANAGER' ? 'role-manager' : 'role-member')}"
                                          th:text="${member.role == 'OWNER' ? '모임장' : (member.role == 'MANAGER' ? '운영진' : '일반회원')}">
                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-5 text-center">
                    <a th:href="@{/club/list}" class="btn btn-outline-secondary px-5 py-2 rounded-pill">
                        <i class="bi bi-arrow-left me-2"></i>목록으로 돌아가기
                    </a>
                </div>

                <div id="applyModal" class="modal">
                    <div class="modal-content">
                        <h4 class="fw-bold mb-4">가입 신청</h4>
                        <div class="mb-4">
                            <label class="form-label fw-bold text-secondary">가입 질문</label>
                            <p class="text-dark bg-light p-3 rounded" th:text="${club.joinQuestion}">질문 내용</p>
                            <textarea id="applyAnswer" class="form-control mt-2" rows="3" placeholder="답변을 입력해주세요"></textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="button" class="btn btn-primary w-100 py-2" th:onclick="|submitApply(${club.clubId})|">신청하기</button>
                            <button type="button" class="btn btn-light w-100 py-2" onclick="closeApplyModal()">닫기</button>
                        </div>
                    </div>
                </div>

                <div id="leaveModal" class="modal">
                    <div class="modal-content">
                        <h4 class="fw-bold mb-4">모임 탈퇴</h4>
                        <div class="mb-4">
                            <label class="form-label fw-bold text-secondary">탈퇴 사유</label>
                            <select id="leaveReasonSelect" class="form-select mb-2" onchange="toggleLeaveEtcInput()">
                                <option value="활동 저조">활동 저조</option>
                                <option value="시간 부족">시간 부족</option>
                                <option value="기타">기타 (직접 입력)</option>
                            </select>
                            <div id="leaveEtcWrapper" style="display:none;">
                                <textarea id="leaveEtcInput" class="form-control" rows="2" placeholder="사유를 입력하세요"></textarea>
                            </div>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="button" class="btn btn-danger w-100 py-2" th:onclick="|submitLeave(${club.clubId})|">탈퇴하기</button>
                            <button type="button" class="btn btn-light w-100 py-2" onclick="closeLeaveModal()">취소</button>
                        </div>
                    </div>
                  </div>
                  <div class="d-flex gap-2">
                    <button
                      type="button"
                      class="btn btn-danger w-100 py-2"
                      th:onclick="|submitLeave(${club.clubId})|"
                    >
                      탈퇴하기
                    </button>
                    <button
                      type="button"
                      class="btn btn-light w-100 py-2"
                      onclick="closeLeaveModal()"
                    >
                      취소
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        </div>
    </main>
    <footer th:replace="~{fragments/footer :: footer}" class="footer mt-5"></footer>
</div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/club/clubDetail.js}"></script>
</body>
</html>
