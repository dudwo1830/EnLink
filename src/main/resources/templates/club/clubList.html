<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('EnLink - 모임 목록', ~{::link}, ~{::script})}">
    <link rel="stylesheet" href="#" th:if="${false}"/>
    <style>
        .club-img-wrapper {
            width: 200px !important;
            height: 150px !important;
            flex-shrink: 0; /* 👈 사이드바 때문에 눌리는 것 방지 */
            overflow: hidden;
            background-color: #f8f9fa; /* 이미지 로딩 전 배경색 */
        }
        .club-img-wrapper img {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important; /* 👈 비율 유지하며 꽉 채우기 */
            display: block;
        }
    </style>
    <script src="#" th:if="${false}"></script>
</head>
<body class="bg-light">
<div class="grid-container">

    <header th:replace="~{fragments/header :: header}" class="header shadow-sm"></header>

    <aside th:replace="~{fragments/aside :: aside}" class="aside"></aside>

    <main class="main py-5">
        <div class="container">
            <div class="list-content-container">
                <hr class="mb-5">

                <div th:if="${#lists.isEmpty(clubs)}" class="alert alert-light text-center py-5 shadow-sm">
                    <i class="bi bi-search fs-1 text-muted d-block mb-3"></i>
                    <span class="text-muted">개설된 모임이 없습니다. 첫 번째 모임을 만들어보세요!</span>
                </div>

                <div class="club-list d-flex flex-column gap-3">
                    <a th:each="club : ${clubs}" th:href="@{/club/{id}(id=${club.clubId})}" class="club-item-card text-decoration-none text-dark bg-white rounded shadow-sm d-flex overflow-hidden border">

                        <div class="club-img-wrapper" style="width: 200px !important; height: 150px !important; min-width: 200px !important; overflow: hidden !important; flex-shrink: 0 !important;">
                            <img th:src="${club.imageUrl != null and club.imageUrl != ''} ? ${club.imageUrl} : '/images/default_club.jpg'"
                                 alt="모임 이미지"
                                 style="width: 100% !important; height: 100% !important; object-fit: cover !important; display: block !important;"
                                 onerror="this.onerror=null; this.src='/images/default_club.jpg';">
                        </div>

                        <div class="club-info p-4 flex-grow-1">
                            <h3 class="fw-bold mb-2" th:text="${club.name}">모임 이름</h3>
                            <p th:if="${club.description != null}" th:text="${club.description}" class="club-desc text-muted small mb-3">모임 설명...</p>

                            <div class="club-meta small text-secondary">
                                <span class="badge bg-light text-dark border me-1" th:text="${club.topicName}">주제명</span>
                                <i class="bi bi-geo-alt-fill ms-2 me-1"></i><span th:text="${club.cityName}">지역명</span>
                                <i class="bi bi-people-fill ms-3 me-1"></i>
                                <span>멤버 <span class="fw-bold text-primary" th:text="${club.currentMemberCount}">0</span> / <span th:text="${club.maxMemberCount}">10</span></span>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </div>

        <footer th:replace="~{fragments/footer :: footer}" class="footer"></footer>
    </main>

</div>
</body>
</html>
