<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('새로운 모임 만들기', ~{::link}, ~{::script})}">
    <link rel="stylesheet" th:href="@{/css/search-select.css}" />
    <script th:src="@{/js/common/search-select.js}" defer></script>
    <script th:src="@{/js/club/create-club-form.js}" defer></script>
</head>
<body>
<div class="grid-container">
    <header th:replace="~{fragments/header :: header}" class="header"></header>

    <main class="main">
        <div class="create-content-container">
            <h1>새로운 모임 만들기</h1>

            <form id="createClubForm" th:object="${clubDTO}" enctype="multipart/form-data" class="create-form">

                <div class="form-group">
                    <label>모임 이름:</label>
                    <input type="text" th:field="*{name}" placeholder="모임명을 입력하세요" required>
                </div>

                <div class="form-group">
                    <label>모임 이미지 업로드</label>
                    <input type="file" th:field="*{uploadFile}" accept="image/*">
                    <p class="help-text">* 이미지를 선택하지 않으면 기본 이미지가 등록됩니다.</p>
                </div>

                <div class="form-group">
                    <label>관심사 카테고리:</label>
                    <div class="select-search topics" data-name="topicId">
                        <input type="text" class="select-input" autocomplete="false" />
                        <input type="hidden" class="select-hidden" />
                        <ul class="select-options"></ul>
                    </div>
                </div>

                <div class="form-group">
                    <label>상세 지역 (구/군)</label>
                    <div class="select-search regions" data-name="regionId">
                        <input type="text" class="select-input" autocomplete="false" />
                        <input type="hidden" class="select-hidden" />
                        <ul class="select-options"></ul>
                    </div>
                    <div class="select-search cities" data-name="cityId">
                        <input type="text" class="select-input" autocomplete="false" />
                        <input type="hidden" class="select-hidden" />
                        <ul class="select-options"></ul>
                    </div>
                </div>

                <div class="form-group">
                    <label>최대 인원:</label>
                    <input type="number" th:field="*{maxMember}" min="2" max="100">
                </div>

                <div class="form-group">
                    <label>모임 소개:</label>
                    <textarea th:field="*{description}" rows="5" placeholder="모임을 소개해 주세요"></textarea>
                </div>

                <div class="form-group">
                    <label>가입 질문:</label>
                    <input type="text" th:field="*{joinQuestion}" placeholder="가입 신청자에게 물어볼 질문">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit">모임 개설하기</button>
                    <a th:href="@{/}" class="btn-cancel">취소</a>
                </div>
            </form>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}" class="footer"></footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script th:src="@{/js/club/createClub.js}"></script>
</body>
</html>
