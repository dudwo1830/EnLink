<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('새로운 모임 만들기', ~{::link}, ~{::script})}">
    <link rel="stylesheet" href="#" th:if="${false}"/>
    <script src="#" th:if="${false}"></script>
</head>
<body>
<div class="grid-container">
    <header th:replace="~{fragments/header :: header}" class="header"></header>

    <main class="main">
        <div class="create-content-container">
            <h1>새로운 모임 만들기</h1>


            <form id="createClubForm" th:object="${clubCreateRequest}" enctype="multipart/form-data" class="create-form" method="post" th:action="@{/club/create}">

                <div class="form-group">
                    <label>모임 이름:</label>
                    <input type="text" th:field="*{name}" placeholder="모임명을 입력하세요" required>
                </div>

                <div class="form-group">
                    <label>모임 이미지 업로드</label>
                    <input type="file" th:field="*{uploadFile}" accept="image/*">
                    <p class="help-text">* 이미지를 선택하지 않으면 기본 이미지가 등록됩니다.</p>
                </div>

                <div class="form-group">
                    <label>관심사 카테고리:</label>
                    <!-- DTO 구조에 맞게 topicId 사용 -->
                    <select th:field="*{topicId}" class="form-select" required>
                        <option value="">-- 관심사 선택 --</option>
                        <option th:each="topic : ${topics}"
                                th:value="${topic.topicId}"
                                th:text="${topic.name}">운동</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>상세 지역 (구/군)</label>
                    <select th:field="*{cityId}" class="form-select" required>
                        <option value="">-- 상세 지역 선택 --</option>
                        <option value="1">종로구</option>
                        <option value="2">중구</option>
                        <option value="3">강남구</option>
                        <option value="4">송파구</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>최대 인원:</label>
                    <input type="number" th:field="*{maxMember}" min="2" max="100">
                </div>

                <div class="form-group">
                    <label>모임 소개:</label>
                    <textarea th:field="*{description}" rows="5" placeholder="모임을 소개해 주세요"></textarea>
                </div>

                <div class="form-group">
                    <label>가입 질문:</label>
                    <input type="text" th:field="*{joinQuestion}" placeholder="가입 신청자에게 물어볼 질문">
                </div>

                <div class="form-actions">
                    <!-- JS 이벤트 사용 중이면 type="button" 그대로 가능 -->
                    <button type="button" id="submitBtn" class="btn-submit">모임 개설하기</button>
                    <a th:href="@{/}" class="btn-cancel">취소</a>
                </div>
            </form>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}" class="footer"></footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/club/createClub.js}"></script>
</body>
</html>
