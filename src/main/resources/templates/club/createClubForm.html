<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('새로운 모임 만들기', ~{::link}, ~{::script})}">
    <link rel="stylesheet" href="#" th:if="${false}"/>
    <script src="#" th:if="${false}"></script>
</head>
<body class="bg-light">
<div class="grid-container">

    <header th:replace="~{fragments/header :: header}" class="header shadow-sm"></header>

    <aside th:replace="~{fragments/aside :: aside}" class="aside"></aside>

    <main class="main overflow-auto py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-10">
                    <div class="card shadow-sm border-0">
                        <div class="card-header bg-white py-3 border-bottom">
                            <h3 class="card-title fw-bold mb-0 text-primary">
                                <i class="bi bi-plus-circle-fill me-2"></i>새로운 모임 만들기
                            </h3>
                        </div>
                        <div class="card-body p-4 p-md-5">
                            <form id="createClubForm" th:object="${clubCreateRequest}" enctype="multipart/form-data" method="post" th:action="@{/club/create}">

                                <div class="mb-4">
                                    <label class="form-label fw-bold">모임 이름</label>
                                    <input type="text" th:field="*{name}" class="form-control form-control-lg" placeholder="모임명을 입력하세요" required>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-4">
                                        <label class="form-label fw-bold">관심사 카테고리</label>
                                        <select th:field="*{topicId}" class="form-select" required>
                                            <option value="">-- 선택 --</option>
                                            <option th:each="topic : ${topics}" th:value="${topic.topicId}" th:text="${topic.name}">운동</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6 mb-4">
                                        <label class="form-label fw-bold">최대 인원</label>
                                        <input type="number" th:field="*{maxMember}" class="form-control" min="2" max="100">
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label fw-bold">상세 지역 (구/군)</label>
                                    <select th:field="*{cityId}" class="form-select" required>
                                        <option value="">-- 상세 지역 선택 --</option>
                                        <option value="1">종로구</option>
                                        <option value="2">중구</option>
                                        <option value="3">강남구</option>
                                        <option value="4">송파구</option>
                                    </select>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label fw-bold">모임 소개</label>
                                    <textarea th:field="*{description}" class="form-control" rows="4" placeholder="모임을 소개해 주세요"></textarea>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label fw-bold">가입 질문</label>
                                    <input type="text" th:field="*{joinQuestion}" class="form-control" placeholder="가입 신청자에게 물어볼 질문">
                                </div>

                                <div class="mb-5">
                                    <label class="form-label fw-bold">대표 이미지</label>
                                    <input type="file" th:field="*{uploadFile}" class="form-control" accept="image/*">
                                </div>

                                <div class="d-grid gap-2 d-md-flex justify-content-md-end pt-3">
                                    <a th:href="@{/}" class="btn btn-light px-4 me-md-2">취소</a>
                                    <button type="button" id="submitBtn" class="btn btn-primary px-5 fw-bold">모임 개설하기</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}" class="footer"></footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/club/createClub.js}"></script>
</body>
</html>
