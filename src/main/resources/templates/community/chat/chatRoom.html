<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="~{fragments/head :: head('EnLink - 채팅', ~{::style}, ~{::script})}"
  >
    <meta charset="UTF-8" />
    <title>채팅방</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
      /* 페이지 wrapper */
      .chat-page .chat-wrapper {
        width: 100%;
        max-width: 100%;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      .chat-page .section-title-box {
        align-items: flex-start;
        margin-bottom: 14px;
        padding-bottom: 0;
        border-bottom: 0;
      }

      /* ✅ 채팅 제목 영역(아이콘 + 제목/설명) */
      .chat-page .section-title-box {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;

        margin-bottom: 14px;
        padding-bottom: 12px;

        /* 필요하면 다시 살릴 수 있음
  border-bottom: 1px solid var(--color-border);
  */
      }

      .chat-page .section-title-wrap {
        display: grid;
        grid-template-columns: 38px 1fr;
        grid-template-rows: auto auto;
        column-gap: 12px;
        row-gap: 6px;
        align-items: center; /* ✅ 1행(제목)의 세로 가운데로 맞춤 */
      }

      .chat-page .title-text {
        display: grid;
        gap: 6px;
      }

      .chat-page .page-title {
        margin: 0;
        font-size: 22px;
        font-weight: 900;
        letter-spacing: -0.02em;
        line-height: 1.2;
        grid-column: 2;
        grid-row: 1;
      }

      .chat-page .page-subtitle {
        margin: 0; /* ✅ 이거 중요: p 기본 margin 때문에 정렬이 망가짐 */
        font-size: 13px;
        font-weight: 700;
        color: var(--color-subtext);
        line-height: 1.2;
        grid-column: 2;
        grid-row: 2;
      }

      /* ✅ 아이콘 */
      .chat-page .chat-title-icon {
        width: 38px;
        height: 38px;
        border-radius: 12px;
        background: rgba(92, 99, 230, 0.12);
        border: 1px solid rgba(92, 99, 230, 0.25);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: rgba(92, 99, 230, 1);
        flex: 0 0 auto;
        grid-column: 1;
        grid-row: 1; /* ✅ 아이콘은 “제목 행”에만 둔다 */
        align-self: center; /* ✅ 제목(h2) 세로 중앙에 고정 */
        margin-top: 0; /* ✅ 기존에 넣었던 margin-top은 제거 */
      }

      .chat-page .chat-title-icon svg {
        width: 20px;
        height: 20px;
      }

      /* ✅ 채팅 + 우측 패널 레이아웃 */
      .chat-page .chat-layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 300px;
        gap: 16px;
        align-items: start;
      }

      /* 채팅 카드 */
      .chat-page .chat-card {
        border: 1px solid var(--color-border);
        border-radius: 14px;

        background:
          radial-gradient(
            900px 400px at 0% 0%,
            rgba(142, 140, 216, 0.08),
            transparent 55%
          ),
          radial-gradient(
            800px 400px at 100% 0%,
            rgba(92, 99, 230, 0.06),
            transparent 60%
          ),
          var(--color-surface);

        box-shadow: 0 14px 36px rgba(142, 140, 216, 0.12);
        overflow: hidden;

        display: flex;
        flex-direction: column;
        height: min(72vh, 720px);
      }

      /* 메시지 영역 */
      .chat-page #message-area {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;

        background: #ffffff;
        border-bottom: 1px solid var(--color-border);
      }

      .chat-page #input-area {
        min-height: 0;
      }

      /* 스크롤바 */
      .chat-page #message-area::-webkit-scrollbar {
        width: 10px;
      }
      .chat-page #message-area::-webkit-scrollbar-thumb {
        background: rgba(31, 41, 55, 0.15);
        border-radius: 999px;
        border: 2px solid transparent;
        background-clip: content-box;
      }

      /* 날짜 구분선 */
      .chat-page .date-divider {
        text-align: center;
        color: #6b7280;
        padding: 8px 12px;
        border-radius: 999px;
        margin: 8px auto 2px;
        font-size: 12px;
        font-weight: 900;
        background: rgba(107, 114, 128, 0.12);
        border: 1px solid rgba(107, 114, 128, 0.18);
        width: fit-content;
      }

      /* 메시지 버블 */
      .chat-page .message {
        padding: 10px 12px;
        border-radius: 16px;
        max-width: min(76%, 540px);
        position: relative;
        word-break: break-word;
        line-height: 1.45;
        display: grid;
        gap: 6px;
      }

      .chat-page .sender-name {
        font-size: 12px;
        font-weight: 900;
        color: rgba(17, 24, 39, 0.55);
        display: block;
      }

      .chat-page .msg-time {
        font-size: 11px;
        font-weight: 900;
        color: rgba(107, 114, 128, 0.8);
        justify-self: end;
        margin-top: 2px;
      }

      .chat-page .my-message {
        align-self: flex-end;
        background: rgba(92, 99, 230, 0.12);
        border: 1px solid rgba(92, 99, 230, 0.22);
      }

      .chat-page .other-message {
        align-self: flex-start;
        background: rgba(142, 140, 216, 0.06);
        border: 1px solid rgba(142, 140, 216, 0.15);
      }

      .chat-page .content {
        font-size: 14px;
        font-weight: 800;
        color: #111827;
        white-space: pre-wrap;
      }

      /* 이미지 메시지 */
      .chat-page .message img {
        cursor: zoom-in;
        max-width: 240px;
        border-radius: 14px;
        border: 1px solid rgba(17, 24, 39, 0.1);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.06);
        transition:
          transform 0.15s ease,
          filter 0.15s ease;
      }
      .chat-page .message img:hover {
        transform: scale(1.01);
        filter: brightness(0.98);
      }

      /* 입력 영역 */
      .chat-page #input-area {
        display: flex;
        gap: 10px;
        padding: 12px;
        border-top: 1px solid #eef0f4;
        background: #fff;
        align-items: center;
      }

      .chat-page .btn {
        border-radius: 14px !important;
        font-weight: 900;
        letter-spacing: -0.2px;
        transition:
          transform 0.12s ease,
          box-shadow 0.12s ease,
          filter 0.12s ease;
      }
      .chat-page .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 14px 28px rgba(0, 0, 0, 0.1);
      }
      .chat-page .btn:active {
        transform: translateY(0);
        filter: brightness(0.98);
      }

      .chat-page #file-btn {
        color: var(--color-primary);
      }

      .chat-page #message-input {
        flex-grow: 1;
        height: 44px;
        border-radius: 14px;
        border: 1px solid rgba(17, 24, 39, 0.12);
        padding: 0 14px;
        font-weight: 800;
        outline: none;
      }
      .chat-page #message-input:focus {
        border-color: rgba(92, 99, 230, 0.55);
        box-shadow: 0 0 0 4px rgba(92, 99, 230, 0.12);
      }

      .chat-page #send-btn {
        height: 44px;
        padding: 0 16px;
      }

      /* ✅ 우측 패널 */
      .chat-page .side-card {
        border: 1px solid var(--color-border);
        border-radius: 14px;
        background: var(--color-surface);
        box-shadow: 0 10px 30px rgba(142, 140, 216, 0.08);
      }

      .chat-page .side-head {
        padding: 14px 14px 10px;
        border-bottom: 1px solid #eef0f4;
        background: linear-gradient(
          180deg,
          rgba(92, 99, 230, 0.06),
          rgba(92, 99, 230, 0)
        );
      }

      .chat-page .side-title {
        margin: 0;
        font-size: 14px;
        font-weight: 900;
        color: #111827;
      }

      .chat-page .side-sub {
        margin: 6px 0 0;
        font-size: 12px;
        font-weight: 800;
        color: #6b7280;
      }

      .chat-page .side-body {
        padding: 12px 14px 14px;
      }

      .chat-page .mini-input {
        width: 100%;
        height: 38px;
        border-radius: 12px;
        border: 1px solid rgba(17, 24, 39, 0.12);
        padding: 0 12px;
        font-weight: 800;
        outline: none;
      }
      .chat-page .mini-input:focus {
        border-color: rgba(92, 99, 230, 0.55);
        box-shadow: 0 0 0 4px rgba(92, 99, 230, 0.1);
      }

      .chat-page .member-list {
        margin-top: 10px;
        display: grid;
        gap: 8px;
        max-height: min(52vh, 520px);
        overflow: auto;
        padding-right: 4px;
      }

      .chat-page .member-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 10px;
        border-radius: 14px;
        border: 1px solid rgba(17, 24, 39, 0.08);
        background: #fff;
      }

      .chat-page .member-left {
        min-width: 0;
        display: grid;
        gap: 2px;
      }

      .chat-page .member-name {
        font-weight: 900;
        color: #111827;
        font-size: 13px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .chat-page .member-id {
        font-weight: 800;
        color: #6b7280;
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .chat-page .role-badge {
        font-size: 11px;
        font-weight: 900;
        padding: 6px 8px;
        border-radius: 999px;
        border: 1px solid rgba(92, 99, 230, 0.22);
        background: rgba(92, 99, 230, 0.1);
        color: rgba(92, 99, 230, 1);
        white-space: nowrap;
      }

      .chat-page .role-badge.manager {
        border-color: rgba(34, 197, 94, 0.24);
        background: rgba(34, 197, 94, 0.1);
        color: rgba(22, 163, 74, 1);
      }

      .chat-page .role-badge.member {
        border-color: rgba(107, 114, 128, 0.22);
        background: rgba(107, 114, 128, 0.1);
        color: rgba(75, 85, 99, 1);
      }

      /* ✅ Lightbox (ID 충돌 방지) */
      .chat-page #chat-image-viewer {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: rgba(0, 0, 0, 0.72);
        backdrop-filter: blur(2px);
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .chat-page #chat-image-viewer.is-open {
        display: flex;
      }
      .chat-page #chat-image-viewer .viewer-box {
        position: relative;
        width: min(900px, 92vw);
        height: min(600px, 80vh);
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 18px;
        overflow: hidden;
      }
      .chat-page #chat-full-image {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }
      .chat-page #chat-image-viewer .viewer-close {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 42px;
        height: 42px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        background: rgba(255, 255, 255, 0.14);
        color: #fff;
        font-size: 22px;
        font-weight: 900;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      /* 반응형: 좁아지면 우측 패널 아래로 */
      @media (max-width: 980px) {
        .chat-page .chat-layout {
          grid-template-columns: 1fr;
        }
        .chat-page .side-card {
          position: static;
        }
      }

      /* ✅ 카톡 느낌 강화: 내 메시지 이름 숨김 */
      .chat-page .my-message .sender-name {
        display: none;
      }

      /* ✅ 말풍선 꼬리 (before) */
      .chat-page .message::before {
        content: '';
        position: absolute;
        bottom: 10px;
        width: 0;
        height: 0;
        border: 8px solid transparent;
      }

      /* 상대 말풍선 꼬리(왼쪽) */
      .chat-page .other-message::before {
        left: -10px;
        border-right-color: rgba(17, 24, 39, 0.1); /* 테두리 색 */
        border-left: 0;
      }
      .chat-page .other-message::after {
        content: '';
        position: absolute;
        bottom: 10px;
        left: -9px;
        width: 0;
        height: 0;
        border: 7px solid transparent;
        border-right-color: rgba(142, 140, 216, 0.06);
        border-left: 0;
      }

      /* 내 말풍선 꼬리(오른쪽) */
      .chat-page .my-message::before {
        right: -10px;
        border-left-color: rgba(92, 99, 230, 0.22); /* 테두리 색 */
        border-right: 0;
      }
      .chat-page .my-message::after {
        content: '';
        position: absolute;
        bottom: 10px;
        right: -9px;
        width: 0;
        height: 0;
        border: 7px solid transparent;
        border-left-color: rgba(92, 99, 230, 0.12); /* 버블 배경 */
        border-right: 0;
      }

      /* ✅ 연속 메시지 묶기용 클래스 */
      .chat-page .message.is-grouped {
        margin-top: -6px; /* 위 메시지와 더 붙게 */
      }
      .chat-page .message.is-grouped .sender-name {
        display: none; /* 연속이면 상대 이름도 숨김 */
      }
      .chat-page .message.is-grouped::before,
      .chat-page .message.is-grouped::after {
        display: none; /* 중간 말풍선은 꼬리 제거 */
      }

      /* ✅ 시간 위치 살짝 정리 */
      .chat-page .msg-time {
        margin-top: 0;
        opacity: 0.9;
      }

      /* ✅ 다른 탭과 패널 톤 통일(덮어쓰기) */
      .chat-page .chat-card,
      .chat-page .side-card {
        border: 1px solid var(--color-border);
        border-radius: 14px;
        background: var(--color-surface);
        box-shadow: 0 10px 30px rgba(142, 140, 216, 0.08);
      }
    </style>
  </head>

  <body class="bg-light chat-page">
    <div class="grid-container">
      <header th:replace="~{fragments/header :: header}"></header>
      <aside th:replace="~{fragments/aside :: aside}"></aside>

      <main class="main">
        <div class="club-shell">
          <div th:replace="~{fragments/clubTabs :: clubTabs('chat')}"></div>

          <div class="chat-wrapper">
            <div class="section-title-box">
              <div class="section-title-wrap">
                <span class="chat-title-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none">
                    <path
                      d="M4 6.5C4 5.12 5.12 4 6.5 4h11C18.88 4 20 5.12 20 6.5v6c0 1.38-1.12 2.5-2.5 2.5H10l-4 3v-3H6.5C5.12 15 4 13.88 4 12.5v-6Z"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linejoin="round"
                    />
                  </svg>
                </span>

                <h2
                  class="page-title"
                  th:text="${club != null ? club.name : '모임 채팅'}"
                >
                  모임 채팅
                </h2>

                <p class="page-subtitle">멤버들과 실시간으로 대화해보세요.</p>
              </div>
            </div>

            <div class="chat-layout">
              <!-- 채팅 -->
              <div class="chat-card">
                <div id="message-area"></div>

                <div id="input-area">
                  <input
                    type="file"
                    id="file-input"
                    accept="image/*"
                    style="display: none"
                  />
                  <button
                    id="file-btn"
                    class="btn"
                    type="button"
                    title="이미지 첨부"
                  >
                    <svg
                      viewBox="0 0 24 24"
                      width="18"
                      height="18"
                      fill="none"
                      aria-hidden="true"
                    >
                      <path
                        d="M21 12.5 12.5 21a6 6 0 1 1-8.5-8.5L13 3.5a4 4 0 0 1 5.7 5.7l-9.2 9.2a2 2 0 1 1-2.8-2.8l8.5-8.5"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      />
                    </svg>
                  </button>

                  <input
                    type="text"
                    id="message-input"
                    placeholder="메시지를 입력하세요..."
                    autocomplete="off"
                  />

                  <button id="send-btn" class="btn btn-primary" type="button">
                    전송
                  </button>
                </div>
              </div>

              <!-- 우측 패널 -->
              <aside class="side-card" aria-label="모임 정보 패널">
                <div class="side-head">
                  <h3 class="side-title">모임 정보</h3>
                  <p class="side-sub">
                    <span th:text="${club != null ? club.name : ''}"></span>
                    <span
                      th:text="' · 활동 멤버 ' + ${#lists.size(members)} + '명'"
                    >
                      · 활동 멤버 0명</span
                    >
                  </p>
                </div>

                <div class="side-body">
                  <input
                    id="memberSearch"
                    class="mini-input"
                    type="text"
                    placeholder="멤버 검색 (이름/아이디)"
                    autocomplete="off"
                  />

                  <div class="member-list" id="memberList">
                    <div
                      class="member-item"
                      th:each="m : ${members}"
                      th:attr="data-name=${m.memberName}, data-id=${m.memberId}"
                    >
                      <div class="member-left">
                        <div class="member-name" th:text="${m.memberName}">
                          홍길동
                        </div>
                        <div class="member-id" th:text="${m.memberId}">
                          @hong
                        </div>
                      </div>

                      <span
                        class="role-badge"
                        th:classappend="${m.role == 'OWNER' ? '' : (m.role == 'MANAGER' ? ' manager' : ' member')}"
                        th:text="${m.role == 'OWNER' ? '운영자' : (m.role == 'MANAGER' ? '매니저' : '멤버')}"
                        >멤버</span
                      >
                    </div>

                    <div
                      th:if="${members == null || #lists.isEmpty(members)}"
                      class="member-item"
                    >
                      <div class="member-left">
                        <div class="member-name">활동 멤버가 없습니다</div>
                        <div class="member-id">-</div>
                      </div>
                      <span class="role-badge member">-</span>
                    </div>
                  </div>
                </div>
              </aside>
            </div>
          </div>
        </div>
      </main>

      <footer th:replace="~{fragments/footer :: footer}"></footer>
    </div>

    <!-- Lightbox -->
    <div id="chat-image-viewer" onclick="closeImage()">
      <div class="viewer-box" onclick="event.stopPropagation()">
        <button class="viewer-close" type="button" onclick="closeImage()">
          ×
        </button>
        <img id="chat-full-image" alt="full image" />
      </div>
    </div>

    <script th:inline="javascript">
      const clubId = /*[[${clubId}]]*/ 1;
      const userId = /*[[${userId}]]*/ 'default';

      let stompClient = null;
      let page = 0;
      let isLastPage = false;
      let lastRenderedDate = null;

      $(document).ready(function () {
        connect();
        loadChatHistory();

        $('#send-btn').click(sendMessage);

        $('#message-input').keypress(function (e) {
          if (e.which == 13) sendMessage();
        });

        $('#message-area').scroll(function () {
          if ($('#message-area').scrollTop() == 0 && !isLastPage) {
            loadChatHistory();
          }
        });

        // 파일 첨부
        $('#file-btn').click(() => $('#file-input').click());
        $('#file-input').change(function () {
          const file = this.files[0];
          if (!file) return;

          const formData = new FormData();
          formData.append('file', file);
          formData.append('clubId', clubId);

          $.ajax({
            url: '/api/chat/upload',
            type: 'POST',
            data: formData,
            processData: false,
            contentType: false,
            success: function (fileUrl) {
              const chatDTO = {
                clubId: clubId,
                senderId: userId,
                content: fileUrl,
                type: 'IMAGE',
              };
              stompClient.send(
                '/pub/chat/message',
                {},
                JSON.stringify(chatDTO),
              );
              $('#file-input').val('');
            },
            error: function () {
              alert('파일 업로드 실패');
            },
          });
        });

        // ✅ 우측 멤버 검색(프론트 필터)
        $('#memberSearch').on('input', function () {
          const q = ($(this).val() || '').toLowerCase().trim();
          $('#memberList .member-item').each(function () {
            const name = (this.dataset.name || '').toLowerCase();
            const id = (this.dataset.id || '').toLowerCase();
            // "활동 멤버가 없습니다" 같은 placeholder는 dataset이 없을 수 있음
            if (!name && !id) return;

            const hit = !q || name.includes(q) || id.includes(q);
            this.style.display = hit ? '' : 'none';
          });
        });
      });

      function connect() {
        const socket = new SockJS('/ws-chat');
        stompClient = Stomp.over(socket);
        stompClient.debug = null;

        stompClient.connect(
          {},
          function () {
            stompClient.subscribe(
              '/sub/chat/room/' + clubId,
              function (response) {
                const message = JSON.parse(response.body);
                displayMessage(message, false);
              },
            );
          },
          function () {
            alert('연결에 실패했습니다. 새로고침 후 다시 시도해주세요.');
          },
        );
      }

      function sendMessage() {
        const content = $('#message-input').val();
        if (!content || !stompClient) return;

        const chatDTO = { clubId: clubId, senderId: userId, content: content };
        stompClient.send('/pub/chat/message', {}, JSON.stringify(chatDTO));
        $('#message-input').val('');
      }

      function loadChatHistory() {
        if (isLastPage) return;

        $.ajax({
          url: `/api/chat/history/${clubId}?page=${page}&size=20`,
          method: 'GET',
          success: function (data) {
            const messages = data.content;
            isLastPage = data.last;

            if (messages.length > 0) {
              messages.reverse();

              lastRenderedDate = null;
              window.__lastSenderId = null;
              window.__lastMessageDate = null;

              let historyHtml = '';
              messages.forEach((msg) => {
                historyHtml += getMessageHtml(msg);
              });

              const $area = $('#message-area');
              const currentScrollHeight = $area[0].scrollHeight;

              $area.prepend(historyHtml);
              normalizeDateDividers();
              $area.scrollTop($area[0].scrollHeight - currentScrollHeight);

              page++;
            }
          },
        });
      }

      // Lightbox
      function openImage(imgSrc) {
        $('#chat-full-image').attr('src', imgSrc);
        $('#chat-image-viewer').addClass('is-open');
      }
      function closeImage() {
        $('#chat-image-viewer').removeClass('is-open');
        $('#chat-full-image').attr('src', '');
      }

      function escapeHtml(text) {
        return String(text)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }

      function getMessageHtml(message) {
        if (!message.sentAt) return '';

        const sentAtParts = message.sentAt.split(' ');
        if (sentAtParts.length < 2) return '';
        const messageDate = sentAtParts[0];
        const rawTime = sentAtParts[1];

        const timeParts = rawTime.split(':');
        let hours = parseInt(timeParts[0], 10);
        const minutes = timeParts[1];

        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12;
        hours = hours ? hours : 12;

        const formattedTime = `${ampm} ${hours}:${minutes}`;

        // 연속 메시지 묶기 판단
        // 같은 날짜 + 같은 senderId + 직전 메시지도 같은 사람이면 grouped 처리
        let groupedClass = '';
        if (
          window.__lastSenderId === message.senderId &&
          window.__lastMessageDate === messageDate
        ) {
          groupedClass = ' is-grouped';
        }
        window.__lastSenderId = message.senderId;
        window.__lastMessageDate = messageDate;

        const isMine = message.senderId === userId;
        const messageClass = isMine ? 'my-message' : 'other-message';

        let contentHtml = '';
        if (
          message.type === 'IMAGE' ||
          (message.content && message.content.startsWith('/chatImg/'))
        ) {
          const src = escapeHtml(message.content);
          contentHtml = `<img src="${src}" alt="chat image" onclick="openImage('${src}')" />`;
        } else {
          contentHtml = `<div class="content">${escapeHtml(message.content ?? '')}</div>`;
        }

        const senderName = escapeHtml(message.senderName ?? '');

        const messageHtml = `
          <div class="message ${messageClass}${groupedClass}">
            <span class="sender-name">${senderName}</span>
            ${contentHtml}
            <span class="msg-time">${formattedTime}</span>
          </div>
        `;

        let totalHtml = messageHtml;
        if (messageDate !== lastRenderedDate) {
          const dateObj = new Date(messageDate);
          const dayOfWeek = ['일', '월', '화', '수', '목', '금', '토'][
            dateObj.getDay()
          ];
          const formattedDate = `${dateObj.getFullYear()}년 ${dateObj.getMonth() + 1}월 ${dateObj.getDate()}일 ${dayOfWeek}요일`;
          const dividerHtml = `<div class="date-divider" data-date="${messageDate}">${formattedDate}</div>`;
          totalHtml = dividerHtml + messageHtml;
          lastRenderedDate = messageDate;
        }
        return totalHtml;
      }

      function displayMessage(message, isHistory) {
        if (isHistory) return;

        const $area = $('#message-area');

        // 사용자가 바닥 근처를 보고 있을 때만 자동 스크롤
        const isNearBottom =
          $area[0].scrollHeight - ($area.scrollTop() + $area.innerHeight()) <
          120;

        const html = getMessageHtml(message);
        $area.append(html);

        if (isNearBottom) {
          $area.scrollTop($area[0].scrollHeight);
        }
      }

              function normalizeDateDividers() {
        const area = document.getElementById('message-area');
        if (!area) return;

        const seen = new Set();

        // 위에서 아래 순서로 보면서, 같은 날짜 divider는 뒤쪽 것 제거
        area.querySelectorAll('.date-divider').forEach((div) => {
          const key = div.dataset.date || div.textContent.trim();
          if (seen.has(key)) div.remove();
          else seen.add(key);
        });
      }
    </script>
  </body>
</html>
