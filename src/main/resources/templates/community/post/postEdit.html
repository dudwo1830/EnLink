<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="~{fragments/head :: head('EnLink - 게시글 수정', ~{::link}, ~{::script})}"
  >
    <link rel="stylesheet" th:href="@{/css/community/post.css}" />
    <script th:src="@{/js/community/post.js}" defer></script>
  </head>

  <body>
    <div
      class="grid-container post-page"
      data-page="post-edit"
      th:attr="data-post-id=${postId}"
    >
      <header th:replace="~{fragments/header :: header}"></header>
      <aside th:replace="~{fragments/aside :: aside}"></aside>

      <main class="main">
        <div class="club-shell">
          <div th:replace="~{fragments/clubTabs :: clubTabs('post')}"></div>

          <div class="post-container">
            <section class="panel">
              <div class="section-header">
                <div class="section-title-wrap">
                  <span class="section-icon" aria-hidden="true"></span>
                  <h1 class="section-title">게시글 수정</h1>
                </div>
                <p class="section-desc">내용을 수정한 뒤 저장해주세요.</p>
              </div>

              <form id="editForm" class="form-grid">
                <div>
                  <label for="title">제목</label>
                  <input
                    id="title"
                    type="text"
                    placeholder="제목을 입력하세요"
                  />
                </div>

                <div>
                  <label for="content">내용</label>
                  <textarea
                    id="content"
                    placeholder="내용을 입력하세요"
                  ></textarea>
                </div>

                <div>
                  <label class="file-label" for="imageFile">이미지 수정</label>

                  <div class="file-uploader">
                    <input
                      id="imageFile"
                      class="file-input"
                      type="file"
                      accept="image/*"
                    />
                    <label for="imageFile" class="file-btn">파일 선택</label>
                    <span id="fileName" class="file-name">변경하려면 선택</span>
                  </div>
                  <div id="imagePreviewBox" class="preview-box">
                    <div style="font-weight: 800; margin-bottom: 10px">
                      미리보기
                    </div>
                    <img id="previewImg" src="" alt="preview" />
                  </div>
                </div>

                <!-- 공지 체크박스는 "권한 있는 경우에만" 보이게 하고 싶다면
                 서버에서 role을 넘겨서 write처럼 th:if로 감싸면 됩니다.
                 지금은 detail API에서 isNotice를 받아와도 체크는 가능.
            -->
                <th:block th:if="${role == 'OWNER' || role == 'MANAGER'}">
                  <div class="notice-row">
                    <label class="notice-check">
                      <input type="checkbox" id="isNotice" />
                      <span class="notice-box" aria-hidden="true"></span>
                      <span class="notice-text">공지사항으로 설정</span>
                    </label>

                    <p class="notice-hint">
                      공지로 설정하면 게시판 상단에 우선 노출됩니다.
                    </p>
                  </div>
                </th:block>

                <div class="form-actions">
                  <button type="submit" class="btn-primary">수정</button>
                  <button id="cancelBtn" type="button" class="btn-ghost">
                    취소
                  </button>
                </div>
              </form>
            </section>
          </div>
        </div>
      </main>

      <footer th:replace="~{fragments/footer :: footer}"></footer>
    </div>
  </body>
</html>
