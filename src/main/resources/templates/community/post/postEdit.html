<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="~{fragments/head :: head('EnLink - 게시글 수정', ~{::link}, ~{::script})}"
  >
    <link rel="stylesheet" th:href="@{/css/community/post.css}" />
    <script th:src="@{/js/community/post.js}" defer></script>
  </head>

  <body>
    <div
      class="grid-container post-page"
      data-page="post-edit"
      th:attr="data-post-id=${postId}"
    >
      <header th:replace="~{fragments/header :: header}"></header>
      <aside th:replace="~{fragments/aside :: aside}"></aside>

      <main class="main">
        <div class="post-container">
          <h1 class="page-title">게시글 수정</h1>

          <section class="panel">
            <form id="editForm" class="form-grid">
              <div>
                <label for="title">제목</label>
                <input id="title" type="text" placeholder="제목을 입력하세요" />
              </div>

              <div>
                <label for="content">내용</label>
                <textarea
                  id="content"
                  placeholder="내용을 입력하세요"
                ></textarea>
              </div>

              <div>
                <label for="imageFile">이미지 수정 (변경하려면 선택)</label>
                <input id="imageFile" type="file" accept="image/*" />
                <div id="imagePreviewBox" class="preview-box">
                  <div style="font-weight: 800; margin-bottom: 10px">
                    미리보기
                  </div>
                  <img id="previewImg" src="" alt="preview" />
                </div>
              </div>

              <!-- 공지 체크박스는 "권한 있는 경우에만" 보이게 하고 싶다면
                 서버에서 role을 넘겨서 write처럼 th:if로 감싸면 됩니다.
                 지금은 detail API에서 isNotice를 받아와도 체크는 가능.
            -->
              <div class="checkbox-row">
                <input type="checkbox" id="isNotice" />
                <label for="isNotice" style="margin: 0"
                  >공지사항으로 설정</label
                >
              </div>

              <div class="form-actions">
                <button id="cancelBtn" type="button" class="btn-ghost">
                  취소
                </button>
                <button type="submit" class="btn-primary">수정</button>
              </div>
            </form>
          </section>
        </div>
      </main>

      <footer th:replace="~{fragments/footer :: footer}"></footer>
    </div>
  </body>
</html>
