<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="~{fragments/head :: head('EnLink - 모임 게시판', ~{::link}, ~{::script})}"
  >
    <link rel="stylesheet" th:href="@{/css/community/post.css}" />
    <script th:src="@{/js/community/post.js}" defer></script>
  </head>

  <body>
    <div
      class="grid-container post-page"
      data-page="post-list"
      th:attr="data-club-id=${clubId}"
    >
      <header th:replace="~{fragments/header :: header}"></header>
      <aside th:replace="~{fragments/aside :: aside}"></aside>

      <main class="main">
        <div class="post-container">
          <h1 class="page-title">모임 게시판</h1>

          <section class="panel">
            <div class="toolbar">
              <div class="toolbar-left">
                <form
                  class="search-form"
                  th:action="@{/community/post/list/{clubId}(clubId=${clubId})}"
                  method="get"
                >
                  <select name="searchType" id="searchType">
                    <option value="all">제목+내용</option>
                    <option value="title">제목</option>
                    <option value="content">내용</option>
                  </select>

                  <input
                    type="text"
                    name="searchKeyword"
                    id="searchKeyword"
                    placeholder="검색어를 입력하세요"
                  />

                  <button type="submit" class="btn-ghost">검색</button>

                  <a
                    class="hint-link"
                    th:href="@{/community/post/list/{clubId}(clubId=${clubId})}"
                    >초기화</a
                  >
                </form>
              </div>

              <div class="toolbar-right">
                <button
                  type="button"
                  class="btn-primary"
                  th:onclick="|location.href='@{/community/post/write(clubId=${clubId})}'|"
                >
                  글쓰기
                </button>
              </div>
            </div>

            <div id="postList" class="post-list"></div>
            <nav id="pagination" class="pagination"></nav>
          </section>
        </div>
      </main>

      <footer th:replace="~{fragments/footer :: footer}"></footer>
    </div>
  </body>
</html>
