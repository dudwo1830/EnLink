<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="~{fragments/head :: head('EnLink - 모임 게시판', ~{::link}, ~{::script})}"
  >
    <link rel="stylesheet" th:href="@{/css/community/post.css}" />
    <script th:src="@{/js/community/post.js}" defer></script>
  </head>

  <body th:classappend="${isClubMember} ? '' : 'not-member'">
    <div
      class="grid-container post-page"
      data-page="post-list"
      th:attr="data-club-id=${clubId}"
    >
      <header th:replace="~{fragments/header :: header}"></header>
      <aside th:replace="~{fragments/aside :: aside}"></aside>

      <main class="main">
        <div class="club-shell">
          <div th:replace="fragments/clubTabs :: clubTabs('post')"></div>

          <section class="post-container">
            <div>
              <div class="section-title-wrap">
                <span
                  class="section-icon section-icon--board"
                  aria-hidden="true"
                >
                  <!-- 게시판 아이콘(문서/리스트 느낌) -->
                  <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path
                      d="M7 4h7l3 3v13a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linejoin="round"
                    />
                    <path
                      d="M14 4v3h3"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linejoin="round"
                    />
                    <path
                      d="M8 11h8M8 14h8M8 17h6"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                    />
                  </svg>
                </span>

                <h1 class="section-title">모임 게시판</h1>
              </div>

              <p class="section-desc">
                모임 소식을 공유하고 자유롭게 글을 작성해보세요.
              </p>
            </div>

            <section class="panel">
              <div class="toolbar">
                <div class="toolbar-left">
                  <form
                    class="search-form"
                    th:action="@{/community/post/list/{clubId}(clubId=${clubId})}"
                    method="get"
                  >
                    <select name="searchType" id="searchType">
                      <option value="all">제목+내용</option>
                      <option value="title">제목</option>
                      <option value="content">내용</option>
                    </select>

                    <input
                      type="text"
                      name="searchKeyword"
                      id="searchKeyword"
                      placeholder="검색어를 입력하세요"
                    />

                    <button type="submit" class="btn-ghost">검색</button>

                    <a
                      class="hint-link"
                      th:href="@{/community/post/list/{clubId}(clubId=${clubId})}"
                      >초기화</a
                    >
                  </form>
                </div>

                <div class="toolbar-right">
                  <button
                    type="button"
                    class="btn-primary"
                    th:if="${loginMember != null and loginMember.role != null}"
                    th:onclick="|location.href='@{/community/post/write(clubId=${clubId})}'|"
                  >
                    글쓰기
                  </button>
                </div>
              </div>

              <div id="postList" class="post-list"></div>
              <nav id="pagination" class="pagination"></nav>
            </section>
          </section>
        </div>
      </main>

      <footer th:replace="~{fragments/footer :: footer}"></footer>
    </div>
  </body>
</html>
