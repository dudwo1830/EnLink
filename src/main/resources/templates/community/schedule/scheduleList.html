<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>모임 일정</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <div
        class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom"
      >
        <h2 class="fw-bold">📅 모임 일정</h2>
        <div id="adminCreateArea" style="display: none">
          <button
            class="btn btn-primary"
            data-bs-toggle="modal"
            data-bs-target="#createScheduleModal"
          >
            일정 추가
          </button>
        </div>
      </div>

      <div id="scheduleContainer" class="row row-cols-1 g-4">
        <div class="col text-center py-5 text-muted">
          등록된 일정이 없습니다. 일정을 추가해 보세요!
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="createScheduleModal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title fw-bold">새 일정 등록</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label for="title" class="form-label">일정 제목</label>
              <input
                type="text"
                id="title"
                class="form-control"
                placeholder="예: 정기 스터디 모임"
              />
            </div>
            <div class="mb-3">
              <label for="eventDate" class="form-label">일시</label>
              <input
                type="datetime-local"
                id="eventDate"
                class="form-control"
              />
            </div>
            <div class="mb-3">
              <label for="location" class="form-label">장소</label>
              <input
                type="text"
                id="location"
                class="form-control"
                placeholder="예: 강남역 스터디룸"
              />
            </div>
            <div class="mb-3">
              <label for="maxCapa" class="form-label">최대 정원</label>
              <input
                type="number"
                id="maxCapa"
                class="form-control"
                placeholder="숫자만 입력"
              />
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              취소
            </button>
            <button
              type="button"
              class="btn btn-primary"
              onclick="saveSchedule()"
            >
              저장하기
            </button>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="updateScheduleModal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header bg-success text-white">
            <h5 class="modal-title fw-bold">일정 수정</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="updateSchedId" />
            <div class="mb-3">
              <label for="updateTitle" class="form-label">일정 제목</label>
              <input type="text" id="updateTitle" class="form-control" />
            </div>
            <div class="mb-3">
              <label for="updateEventDate" class="form-label">일시</label>
              <input
                type="datetime-local"
                id="updateEventDate"
                class="form-control"
              />
            </div>
            <div class="mb-3">
              <label for="updateLocation" class="form-label">장소</label>
              <input type="text" id="updateLocation" class="form-control" />
            </div>
            <div class="mb-3">
              <label for="updateMaxCapa" class="form-label">최대 정원</label>
              <input type="number" id="updateMaxCapa" class="form-control" />
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              취소
            </button>
            <button
              type="button"
              class="btn btn-success"
              onclick="updateSchedule()"
            >
              수정완료
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- 참여자 명단 모달 -->
    <div
      class="modal fade"
      id="participantModal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header bg-light">
            <h5 class="modal-title fw-bold">👥 참여자 명단</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body p-0">
            <ul id="participantList" class="list-group list-group-flush"></ul>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script th:inline="javascript">
      // 타임리프로부터 clubId 전달받기
      const clubId = /*[[${clubId}]]*/ 0;

      // 페이지가 로드되면 실행
      $(document).ready(function () {
        loadSchedules();
      });

      function exceptionTest() {
        $.ajax({
          url: '/api/schedule/test',
          type: 'GET',
          data: { clubId: clubId },
          success: function (list) {
            console.log('success');
            console.log(list);
          },
          error: function (err) {
            console.log('error');
            console.log(err);
            console.log(err.responseJSON);
            console.log(err.responseJSON.defaultMessage);
          },
        });
      }

      // 1. 일정 목록 불러오기 함수
      function loadSchedules() {
        $.ajax({
          url: '/api/schedule/list',
          type: 'GET',
          data: { clubId: clubId },
          success: function (list) {
            // 리스트가 있고, 첫 번째 항목이 운영진 권한(isAdmin)을 가지고 있다면 상단 버튼 표시
            if (list.length > 0 && list[0].admin) {
              // DTO 필드명이 admin이라면 item.admin으로 접근
              $('#adminCreateArea').show(); // 운영진이면 보임
            } else {
              $('#adminCreateArea').hide(); // 일반멤버면 숨김
            }

            let html = '';
            if (list.length === 0) {
              html =
                '<div class="col text-center py-5 text-muted">등록된 일정이 없습니다.</div>';
            } else {
              // 서버에서 받은 리스트를 반복문으로 돌려 카드 생성
              list.forEach(function (item) {
                // 운영진일 때만 수정/삭제 버튼 HTML 생성
                let adminButtons = ''; // 기본은 빈칸
                if (item.admin) {
                  // 서버 DTO의 isAdmin 필드값이 true인 경우
                  adminButtons = `
                    <div>
                        <button class="btn btn-outline-warning btn-sm" onclick='openUpdateModal(${JSON.stringify(item)})'>수정</button>
                        <button class="btn btn-outline-danger btn-sm" onclick="deleteSchedule(${item.schedId})" th:text="#{button.delete}">삭제</button>
                    </div>
                    `;
                }

                // 참가 신청/취소 버튼 분기 처리
                let actionButton = '';
                if (item.joined) {
                  // 이미 참여 중이면 빨간색 취소 버튼
                  actionButton = `<button class="btn btn-danger btn-sm w-100" onclick="cancelSchedule(${item.schedId})">참가 취소</button>`;
                } else {
                  // 참여 전이면 초록색 신청 버튼
                  actionButton = `<button class="btn btn-outline-success btn-sm w-100" onclick="applySchedule(${item.schedId})">참가 신청</button>`;
                }

                html += `
            <div class="col">
              <div class="card shadow-sm h-100">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                  <h5 class="card-title fw-bold text-primary mb-0">${item.title}</h5>
                  ${adminButtons} </div>
                <div class="card-body">
                  <p class="card-text mb-1">📅 <b>일시:</b> ${item.eventDate}</p>
                  <p class="card-text mb-1">📍 <b>장소:</b> ${item.location}</p>
                  <p class="card-text mb-3">
            👥 <b>참가인원:</b> ${item.currentParticipants} / ${item.maxCapa}명
            <a href="javascript:void(0)" class="ms-2 text-decoration-none small fw-bold text-info" 
               onclick="showParticipants(${item.schedId})">명단보기</a>
          </p>
          ${actionButton} </div>
      </div>
    </div>`;
              });
            }
            // 목록 컨테이너에 HTML 주입
            $('#scheduleContainer').html(html);
          },
          error: function (err) {
            console.error('목록 로드 실패:', err);
          },
        });
      }

      // 2. 일정 저장 함수
      function saveSchedule() {
        console.log('저장 시도하는 Club ID:', clubId);

        // 2-1. 데이터 추출
        const title = $('#title').val();
        const rawDate = $('#eventDate').val(); // "2026-02-07T19:00" 형태로 가져옴
        const loc = $('#location').val(); // 변수명 충돌 방지를 위해 loc 사용
        const maxCapa = $('#maxCapa').val();

        // 2-2. 간단한 유효성 검사
        if (!title || !rawDate || !loc) {
          alert('모든 필드를 입력해주세요.');
          return;
        }

        // T를 공백(" ")으로 치환
        const formattedDate = rawDate.replace('T', ' '); // "2026-02-07 19:00"

        // 2-3. 전송 데이터 구성
        const sendData = {
          clubId: clubId,
          title: title,
          eventDate: formattedDate,
          location: loc,
          maxCapa: parseInt(maxCapa),
        };

        // 2-4. Ajax 요청
        $.ajax({
          url: '/api/schedule/create',
          type: 'POST',
          contentType: 'application/json',
          data: JSON.stringify(sendData),
          success: function (response) {
            alert('일정이 성공적으로 등록되었습니다!');
            location.reload();
          },
          error: function (err) {
            alert(
              '등록 실패: ' + (err.responseText || '관리자 권한이 필요합니다.'),
            );
          },
        });
      }

      // 3. 참가 신청 함수
      function applySchedule(schedId) {
        if (!confirm('이 일정에 참가 신청하시겠습니까?')) {
          return;
        }

        $.ajax({
          url: '/api/schedule/apply',
          type: 'POST',
          data: { schedId: schedId },
          success: function (response) {
            alert(response);
            loadSchedules(); // 인원수 업데이트를 위해 목록 새로고침
          },
          error: function (err) {
            alert('신청 실패: ' + err.responseText);
          },
        });
      }

      // 4. 수정 모달 열기 (기존 데이터 채우기)
      function openUpdateModal(item) {
        $('#updateSchedId').val(item.schedId);
        $('#updateTitle').val(item.title);
        // 날짜 형식 맞추기 (공백을 T로 치환)
        $('#updateEventDate').val(item.eventDate.replace(' ', 'T'));
        $('#updateLocation').val(item.location);
        $('#updateMaxCapa').val(item.maxCapa);

        $('#updateScheduleModal').modal('show');
      }

      // 5. 실제 수정 요청
      function updateSchedule() {
        const sendData = {
          schedId: $('#updateSchedId').val(),
          title: $('#updateTitle').val(),
          eventDate: $('#updateEventDate').val().replace('T', ' '),
          location: $('#updateLocation').val(),
          maxCapa: parseInt($('#updateMaxCapa').val()),
        };

        $.ajax({
          url: '/api/schedule/update',
          type: 'PUT',
          contentType: 'application/json',
          data: JSON.stringify(sendData),
          success: function (res) {
            alert(res);
            $('#updateScheduleModal').modal('hide');
            loadSchedules();
          },
          error: function (err) {
            alert(err.responseText);
          },
        });
      }

      // 6. 삭제 요청
      function deleteSchedule(schedId) {
        if (!confirm('정말로 이 일정을 삭제하시겠습니까?')) return;

        $.ajax({
          url: '/api/schedule/delete',
          type: 'DELETE',
          data: { schedId: schedId },
          success: function (res) {
            alert(res);
            loadSchedules();
          },
          error: function (err) {
            alert(err.responseText);
          },
        });
      }

      // 7. 참여자 명단 조회 함수
      function showParticipants(schedId) {
        $.ajax({
          url: '/api/schedule/participants',
          type: 'GET',
          data: { schedId: schedId },
          success: function (list) {
            let html = '';
            if (list.length === 0) {
              html =
                '<li class="list-group-item text-center py-4 text-muted">참여자가 아직 없습니다.</li>';
            } else {
              list.forEach(function (p) {
                html += `
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            <div>
                                <span class="fw-bold">${p.memberName}</span> 
                                <span class="text-muted small">(${p.memberId})</span>
                            </div>
                            <span class="badge bg-success rounded-pill">참가중</span>
                        </li>`;
              });
            }
            $('#participantList').html(html);
            $('#participantModal').modal('show');
          },
          error: function (err) {
            alert('명단을 불러오지 못했습니다.');
          },
        });
      }

      // 8. 참가 취소 함수
      function cancelSchedule(schedId) {
        if (!confirm('정말로 참가를 취소하시겠습니까?')) return;

        $.ajax({
          url: '/api/schedule/cancel',
          type: 'POST',
          data: { schedId: schedId },
          success: function (res) {
            alert(res);
            loadSchedules(); // 버튼 상태를 바꾸기 위해 목록 새로고침
          },
          error: function (err) {
            alert('취소 실패: ' + err.responseText);
          },
        });
      }
    </script>
  </body>
</html>
