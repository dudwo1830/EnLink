<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="~{fragments/head :: head('EnLink - 모임 일정', ~{::style}, ~{::script})}"
  >
    <meta charset="UTF-8" />
    <title>모임 일정</title>

    <style>
      /* ✅ 전역 레이아웃(.grid-container/.main)은 건드리지 않는다 */

      .schedule-page .schedule-wrapper {
        width: 100%;
        max-width: 1120px;
        margin: 0 auto;
        padding: 48px 24px;
        box-sizing: border-box;
      }

      .schedule-page .section-title-box {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 12px;
        margin-bottom: 18px;
        padding-bottom: 14px;
        border-bottom: 2px solid #eaebed;
      }

      .schedule-page .title-wrap {
        display: grid;
        gap: 6px;
      }

      .schedule-page .page-title {
        margin: 0;
        font-size: 24px;
        font-weight: 900;
        letter-spacing: -0.2px;
      }

      .schedule-page .page-subtitle {
        margin: 0;
        font-size: 13px;
        color: #7b7f87;
        font-weight: 700;
      }

      /* 버튼 톤 통일 */
      .schedule-page .btn {
        border-radius: 14px !important;
        font-weight: 800;
        letter-spacing: -0.2px;
        transition: transform 0.12s ease, box-shadow 0.12s ease,
          filter 0.12s ease;
      }

      .schedule-page .btn.btn-primary,
      .schedule-page .btn.btn-success,
      .schedule-page .btn.btn-danger {
        box-shadow: 0 10px 22px rgba(0, 0, 0, 0.06);
      }

      .schedule-page .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 14px 28px rgba(0, 0, 0, 0.1);
      }
      .schedule-page .btn:active {
        transform: translateY(0);
        filter: brightness(0.98);
      }

      .schedule-page .btn[disabled] {
        opacity: 0.6 !important;
        cursor: not-allowed !important;
        transform: none !important;
        box-shadow: none !important;
      }

      .schedule-page #scheduleContainer {
        display: grid;
        gap: 14px;
      }

      .schedule-page .sched-card {
        border: 1px solid #e8eaee;
        border-radius: 18px;
        overflow: hidden;
        background: #fff;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }

      .schedule-page .sched-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.07);
      }

      .schedule-page .sched-card.is-ended {
        opacity: 0.88;
      }
      .schedule-page .sched-card.is-ended .sched-title {
        color: #6b7280;
      }

      .schedule-page .sched-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 14px 10px;
        border-bottom: 1px solid #eef0f4;
        background: linear-gradient(
          180deg,
          rgba(248, 249, 250, 0.95),
          rgba(255, 255, 255, 0.9)
        );
      }

      .schedule-page .sched-title {
        margin: 0;
        font-size: 16px;
        font-weight: 950;
        color: #1f2a37;
        letter-spacing: -0.2px;
        line-height: 1.3;
      }

      .schedule-page .sched-badges {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 8px;
      }

      .schedule-page .badge-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 850;
        border: 1px solid #e8eaee;
        background: #fff;
        color: #394150;
        line-height: 1;
      }

      .schedule-page .badge-chip.primary {
        background: rgba(92, 99, 230, 0.1);
        border-color: rgba(92, 99, 230, 0.25);
        color: #3f46c6;
      }
      .schedule-page .badge-chip.success {
        background: rgba(34, 197, 94, 0.1);
        border-color: rgba(34, 197, 94, 0.25);
        color: #15803d;
      }
      .schedule-page .badge-chip.danger {
        background: rgba(239, 68, 68, 0.1);
        border-color: rgba(239, 68, 68, 0.25);
        color: #b91c1c;
      }
      .schedule-page .badge-chip.gray {
        background: rgba(107, 114, 128, 0.1);
        border-color: rgba(107, 114, 128, 0.22);
        color: #4b5563;
      }
      .schedule-page .badge-chip.orange {
        background: rgba(249, 115, 22, 0.12);
        border-color: rgba(249, 115, 22, 0.25);
        color: #c2410c;
      }

      .schedule-page .admin-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .schedule-page .admin-actions .btn {
        padding: 8px 10px;
        font-size: 12px;
      }

      .schedule-page .sched-body {
        padding: 14px;
        display: grid;
        gap: 10px;
      }

      .schedule-page .kv {
        display: grid;
        grid-template-columns: 88px 1fr;
        gap: 10px;
        align-items: start;
      }

      .schedule-page .kv .k {
        color: #7b7f87;
        font-weight: 800;
        font-size: 13px;
      }

      .schedule-page .kv .v {
        color: #1f2a37;
        font-weight: 800;
        font-size: 13px;
        overflow-wrap: anywhere;
      }

      .schedule-page .line {
        height: 1px;
        background: #eef0f4;
        margin: 2px 0;
      }

      .schedule-page .footer-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .schedule-page .link-mini {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid #e8eaee;
        background: #fff;
        color: #0ea5e9;
        font-size: 12px;
        font-weight: 900;
        text-decoration: none;
      }
      .schedule-page .link-mini:hover {
        text-decoration: none;
        filter: brightness(0.98);
      }

      .schedule-page .action-btn {
        min-width: 160px;
        padding: 10px 14px;
      }

      .schedule-page .empty {
        border: 1px dashed #e0e4ea;
        border-radius: 18px;
        padding: 28px;
        text-align: center;
        color: #7b7f87;
        background: #fff;
      }

      /* 종료 섹션 토글 */
      .schedule-page .ended-wrap {
        margin-top: 18px;
      }

      .schedule-page .ended-toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        border: 1px solid #e8eaee;
        border-radius: 16px;
        background: #fff;
        cursor: pointer;
        user-select: none;
        font-weight: 900;
        color: #4b5563;
      }

      .schedule-page .ended-toggle .small {
        font-weight: 800;
        color: #7b7f87;
      }

      .schedule-page .ended-list {
        display: none;
        margin-top: 12px;
        gap: 14px;
      }

      .schedule-page .ended-wrap.open .ended-list {
        display: grid;
      }

      @media (max-width: 600px) {
        .schedule-page .section-title-box {
          flex-direction: column;
          align-items: flex-start;
        }
        .schedule-page .kv {
          grid-template-columns: 76px 1fr;
        }
        .schedule-page .action-btn {
          width: 100%;
          min-width: 0;
        }
      }

      .schedule-page .modal-content {
        border: none;
        border-radius: 20px;
        overflow: hidden;
      }
      .schedule-page .modal-header {
        border-bottom: 1px solid #eef0f4;
      }
      .schedule-page .modal-footer {
        border-top: 1px solid #eef0f4;
      }
    </style>
  </head>

  <body class="bg-light">
    <div class="grid-container schedule-page">
      <header th:replace="~{fragments/header :: header}"></header>
      <aside th:replace="~{fragments/aside :: aside}"></aside>

      <main class="main">
        <div class="schedule-wrapper">
          <div class="section-title-box">
            <div class="title-wrap">
              <h2 class="page-title">모임 일정</h2>
              <p class="page-subtitle">
                참가 신청하고, 일정에 맞춰 모임을 준비해보세요.
              </p>
            </div>

            <div id="adminCreateArea" style="display: none">
              <button
                class="btn btn-primary px-4"
                data-bs-toggle="modal"
                data-bs-target="#createScheduleModal"
              >
                일정 추가
              </button>
            </div>
          </div>

          <div id="scheduleContainer">
            <div class="empty">등록된 일정이 없습니다. 일정을 추가해 보세요!</div>
          </div>

          <!-- 종료 일정 섹션(토글) -->
          <div class="ended-wrap" id="endedWrap" style="display: none">
            <div class="ended-toggle" id="endedToggle">
              <div>
                종료된 일정 보기
                <span class="small" id="endedCount"></span>
              </div>
              <div id="endedArrow">▾</div>
            </div>
            <div class="ended-list" id="endedList"></div>
          </div>
        </div>
      </main>

      <footer th:replace="~{fragments/footer :: footer}"></footer>
    </div>

    <!-- 생성 모달 -->
    <div class="modal fade" id="createScheduleModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title fw-bold">새 일정 등록</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label for="title" class="form-label fw-bold">일정 제목</label>
              <input type="text" id="title" class="form-control" placeholder="예: 정기 스터디 모임" />
            </div>
            <div class="mb-3">
              <label for="eventDate" class="form-label fw-bold">일시</label>
              <input type="datetime-local" id="eventDate" class="form-control" />
            </div>
            <div class="mb-3">
              <label for="location" class="form-label fw-bold">장소</label>
              <input type="text" id="location" class="form-control" placeholder="예: 강남역 스터디룸" />
            </div>
            <div class="mb-3">
              <label for="maxCapa" class="form-label fw-bold">최대 정원</label>
              <input type="number" id="maxCapa" class="form-control" placeholder="숫자만 입력" />
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-light" data-bs-dismiss="modal">취소</button>
            <button type="button" class="btn btn-primary" onclick="saveSchedule()">저장하기</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 수정 모달 -->
    <div class="modal fade" id="updateScheduleModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title fw-bold">일정 수정</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="updateSchedId" />
            <div class="mb-3">
              <label for="updateTitle" class="form-label fw-bold">일정 제목</label>
              <input type="text" id="updateTitle" class="form-control" />
            </div>
            <div class="mb-3">
              <label for="updateEventDate" class="form-label fw-bold">일시</label>
              <input type="datetime-local" id="updateEventDate" class="form-control" />
            </div>
            <div class="mb-3">
              <label for="updateLocation" class="form-label fw-bold">장소</label>
              <input type="text" id="updateLocation" class="form-control" />
            </div>
            <div class="mb-3">
              <label for="updateMaxCapa" class="form-label fw-bold">최대 정원</label>
              <input type="number" id="updateMaxCapa" class="form-control" />
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-light" data-bs-dismiss="modal">취소</button>
            <button type="button" class="btn btn-primary" onclick="updateSchedule()">수정완료</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 참여자 명단 모달 -->
    <div class="modal fade" id="participantModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header bg-light">
            <h5 class="modal-title fw-bold">참여자 명단</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body p-0">
            <ul id="participantList" class="list-group list-group-flush"></ul>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script th:inline="javascript">
      const clubId = /*[[${clubId}]]*/ 0;

      function parseEventDate(str) {
        if (!str) return null;
        const safe = String(str).replace(' ', 'T');
        const d = new Date(safe);
        return isNaN(d.getTime()) ? null : d;
      }

      function pad2(n) { return String(n).padStart(2, '0'); }

      function formatPrettyDate(str) {
        const d = parseEventDate(str);
        if (!d) return str;
        const m = d.getMonth() + 1;
        const day = d.getDate();
        const hh = pad2(d.getHours());
        const mm = pad2(d.getMinutes());
        const days = ['일', '월', '화', '수', '목', '금', '토'];
        const dayName = days[d.getDay()];
        return `${m}월 ${day}일(${dayName}) ${hh}:${mm}`;
      }

      function isEnded(str) {
        const d = parseEventDate(str);
        if (!d) return false;
        return d.getTime() < Date.now();
      }

      function isFull(item) {
        const cur = Number(item.currentParticipants ?? 0);
        const max = Number(item.maxCapa ?? 0);
        if (!max) return false;
        return cur >= max;
      }

      function dDayText(str) {
        const d = parseEventDate(str);
        if (!d) return null;
        // 날짜 단위로 계산 (오늘 00:00 기준)
        const now = new Date();
        const start = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
        const target = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
        const diffDays = Math.round((target - start) / (1000 * 60 * 60 * 24));

        if (diffDays === 0) return 'D-DAY';
        if (diffDays > 0 && diffDays <= 7) return `D-${diffDays}`;
        return null;
      }

      function sortSchedules(list) {
        // 1) 종료 아닌 것 먼저
        // 2) 날짜 빠른 순
        return [...list].sort((a, b) => {
          const aEnded = isEnded(a.eventDate);
          const bEnded = isEnded(b.eventDate);
          if (aEnded !== bEnded) return aEnded ? 1 : -1;

          const ad = parseEventDate(a.eventDate);
          const bd = parseEventDate(b.eventDate);
          const at = ad ? ad.getTime() : 0;
          const bt = bd ? bd.getTime() : 0;
          return at - bt;
        });
      }

      function renderCard(item) {
        const prettyDate = formatPrettyDate(item.eventDate);
        const ended = isEnded(item.eventDate);
        const full = isFull(item);
        const dday = dDayText(item.eventDate);

        let adminButtons = '';
        if (item.admin) {
          adminButtons = `
            <div class="admin-actions">
              <button class="btn btn-light btn-sm" onclick='openUpdateModal(${JSON.stringify(item)})'>수정</button>
              <button class="btn btn-danger btn-sm" onclick="deleteSchedule(${item.schedId})">삭제</button>
            </div>
          `;
        }

        let statusBadge = '';
        if (ended) statusBadge = `<span class="badge-chip gray">⏱ 종료</span>`;
        else if (full) statusBadge = `<span class="badge-chip danger">🚫 마감</span>`;

        let ddayBadge = '';
        if (!ended && dday) ddayBadge = `<span class="badge-chip orange">⏳ ${dday}</span>`;

        // ✅ 종료면 신청/취소 모두 disabled
        let actionButton = '';
        if (ended) {
          actionButton = `<button class="btn btn-light action-btn" disabled>종료된 일정</button>`;
        } else {
          if (item.joined) {
            actionButton = `<button class="btn btn-danger action-btn" onclick="cancelSchedule(${item.schedId})">참가 취소</button>`;
          } else {
            if (full) actionButton = `<button class="btn btn-light action-btn" disabled>정원 마감</button>`;
            else actionButton = `<button class="btn btn-primary action-btn" onclick="applySchedule(${item.schedId})">참가 신청</button>`;
          }
        }

        const cardClass = ended ? 'sched-card is-ended' : 'sched-card';

        return `
          <div class="${cardClass}">
            <div class="sched-head">
              <div>
                <h5 class="sched-title">${item.title}</h5>
                <div class="sched-badges">
                  <span class="badge-chip primary">📅 ${prettyDate}</span>
                  <span class="badge-chip">📍 ${item.location}</span>
                  <span class="badge-chip success">👥 ${item.currentParticipants} / ${item.maxCapa}명</span>
                  ${ddayBadge}
                  ${statusBadge}
                </div>
              </div>
              ${adminButtons}
            </div>

            <div class="sched-body">
              <div class="kv">
                <div class="k">일시</div>
                <div class="v">${prettyDate}</div>
              </div>
              <div class="kv">
                <div class="k">장소</div>
                <div class="v">${item.location}</div>
              </div>

              <div class="line"></div>

              <div class="footer-row">
                <div>
                  <span class="k" style="font-weight:900; color:#7b7f87;">참가인원</span>
                  <span class="v" style="margin-left:8px;">${item.currentParticipants} / ${item.maxCapa}명</span>
                  <a href="javascript:void(0)" class="link-mini ms-2"
                     onclick="showParticipants(${item.schedId})">👥 명단보기</a>
                </div>
                ${actionButton}
              </div>
            </div>
          </div>
        `;
      }

      $(document).ready(function () {
        // 종료 일정 토글
        $('#endedToggle').on('click', function () {
          $('#endedWrap').toggleClass('open');
          $('#endedArrow').text($('#endedWrap').hasClass('open') ? '▴' : '▾');
        });

        loadSchedules();
      });

      function loadSchedules() {
        $.ajax({
          url: '/api/schedule/list',
          type: 'GET',
          data: { clubId: clubId },
          success: function (list) {
            if (list.length > 0 && list[0].admin) $('#adminCreateArea').show();
            else $('#adminCreateArea').hide();

            if (list.length === 0) {
              $('#scheduleContainer').html(`<div class="empty">등록된 일정이 없습니다. 일정을 추가해 보세요!</div>`);
              $('#endedWrap').hide();
              return;
            }

            const sorted = sortSchedules(list);

            const upcoming = sorted.filter((x) => !isEnded(x.eventDate));
            const ended = sorted.filter((x) => isEnded(x.eventDate));

            // 다가오는 일정 렌더
            $('#scheduleContainer').html(upcoming.map(renderCard).join('') || `<div class="empty">다가오는 일정이 없습니다.</div>`);

            // 종료 일정 렌더 + 토글 표시
            if (ended.length > 0) {
              $('#endedWrap').show();
              $('#endedCount').text(`(${ended.length}개)`);
              $('#endedList').html(ended.map(renderCard).join(''));
              // 기본은 접힘(open 제거)
              $('#endedWrap').removeClass('open');
              $('#endedArrow').text('▾');
            } else {
              $('#endedWrap').hide();
            }
          },
          error: function (err) {
            console.error('목록 로드 실패:', err);
          },
        });
      }

      function saveSchedule() {
        const title = $('#title').val();
        const rawDate = $('#eventDate').val();
        const loc = $('#location').val();
        const maxCapa = $('#maxCapa').val();

        if (!title || !rawDate || !loc) {
          alert('모든 필드를 입력해주세요.');
          return;
        }

        const formattedDate = rawDate.replace('T', ' ');
        const sendData = {
          clubId: clubId,
          title: title,
          eventDate: formattedDate,
          location: loc,
          maxCapa: parseInt(maxCapa),
        };

        $.ajax({
          url: '/api/schedule/create',
          type: 'POST',
          contentType: 'application/json',
          data: JSON.stringify(sendData),
          success: function () {
            alert('일정이 성공적으로 등록되었습니다!');
            location.reload();
          },
          error: function (err) {
            alert('등록 실패: ' + (err.responseText || '관리자 권한이 필요합니다.'));
          },
        });
      }

      function applySchedule(schedId) {
        if (!confirm('이 일정에 참가 신청하시겠습니까?')) return;
        $.ajax({
          url: '/api/schedule/apply',
          type: 'POST',
          data: { schedId: schedId },
          success: function (response) {
            alert(response);
            loadSchedules();
          },
          error: function (err) {
            alert('신청 실패: ' + err.responseText);
          },
        });
      }

      function openUpdateModal(item) {
        $('#updateSchedId').val(item.schedId);
        $('#updateTitle').val(item.title);
        $('#updateEventDate').val(item.eventDate.replace(' ', 'T'));
        $('#updateLocation').val(item.location);
        $('#updateMaxCapa').val(item.maxCapa);
        $('#updateScheduleModal').modal('show');
      }

      function updateSchedule() {
        const sendData = {
          schedId: $('#updateSchedId').val(),
          title: $('#updateTitle').val(),
          eventDate: $('#updateEventDate').val().replace('T', ' '),
          location: $('#updateLocation').val(),
          maxCapa: parseInt($('#updateMaxCapa').val()),
        };

        $.ajax({
          url: '/api/schedule/update',
          type: 'PUT',
          contentType: 'application/json',
          data: JSON.stringify(sendData),
          success: function (res) {
            alert(res);
            $('#updateScheduleModal').modal('hide');
            loadSchedules();
          },
          error: function (err) {
            alert(err.responseText);
          },
        });
      }

      function deleteSchedule(schedId) {
        if (!confirm('정말로 이 일정을 삭제하시겠습니까?')) return;
        $.ajax({
          url: '/api/schedule/delete',
          type: 'DELETE',
          data: { schedId: schedId },
          success: function (res) {
            alert(res);
            loadSchedules();
          },
          error: function (err) {
            alert(err.responseText);
          },
        });
      }

      function showParticipants(schedId) {
        $.ajax({
          url: '/api/schedule/participants',
          type: 'GET',
          data: { schedId: schedId },
          success: function (list) {
            let html = '';
            if (list.length === 0) {
              html = '<li class="list-group-item text-center py-4 text-muted">참여자가 아직 없습니다.</li>';
            } else {
              list.forEach(function (p) {
                html += `
                  <li class="list-group-item d-flex justify-content-between align-items-center">
                    <div>
                      <span class="fw-bold">${p.memberName}</span>
                      <span class="text-muted small">(${p.memberId})</span>
                    </div>
                    <span class="badge bg-success rounded-pill">참가중</span>
                  </li>
                `;
              });
            }
            $('#participantList').html(html);
            $('#participantModal').modal('show');
          },
          error: function () {
            alert('명단을 불러오지 못했습니다.');
          },
        });
      }

      function cancelSchedule(schedId) {
        if (!confirm('정말로 참가를 취소하시겠습니까?')) return;
        $.ajax({
          url: '/api/schedule/cancel',
          type: 'POST',
          data: { schedId: schedId },
          success: function (res) {
            alert(res);
            loadSchedules();
          },
          error: function (err) {
            alert('취소 실패: ' + err.responseText);
          },
        });
      }
    </script>
  </body>
</html>
