<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<aside class="manage-tab-container" th:fragment="sidebar(currentTab)">
    <nav class="manage-tabs">
        <th:block th:if="${loginMember != null && (loginMember.role == 'OWNER' || loginMember.role == 'MANAGER')}">
            <a th:href="@{/club/{id}/manage/requests(id=${clubId})}"
               class="tab-link" th:classappend="${currentTab == 'requests'} ? 'active'">
                <i class="bi bi-person-plus-fill me-1"></i> 신청 현황
            </a>

            <a th:href="@{/club/{id}/manage/edit(id=${clubId})}"
               class="tab-link" th:classappend="${currentTab == 'edit'} ? 'active'">
                <i class="bi bi-pencil-square me-1"></i> 정보 수정
            </a>

            <a th:href="@{/club/{id}/manage/members(id=${clubId})}"
               class="tab-link" th:classappend="${currentTab == 'members'} ? 'active'">
                <i class="bi bi-people-fill me-1"></i> 멤버 관리
            </a>
        </th:block>

        <a th:if="${loginMember != null && loginMember.role == 'OWNER'}"
           th:href="@{/club/{id}/manage/delete(id=${clubId})}"
           class="tab-link delete-link" th:classappend="${currentTab == 'delete'} ? 'active'">
            <i class="bi bi-trash3-fill me-1"></i> 삭제하기
        </a>

        <a th:href="@{/club/{id}(id=${clubId})}" class="tab-link back-link ms-auto">
            <i class="bi bi-arrow-left-circle me-1"></i> 돌아가기
        </a>
    </nav>
</aside>
</html>
