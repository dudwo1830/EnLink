<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments/head :: head('HOME', ~{::link}, ~{::script})}">
    <link rel="stylesheet" th:href="@{/css/search-select.css}" />
    <link rel="stylesheet" th:href="@{/css/card-layout.css}" />
      <link rel="stylesheet" th:href="@{/css/home.css}" />
      <script th:src="@{/js/common/search-select.js}"></script>
    <script type="module" th:src="@{/js/club/list/club-list.js}"></script>

  </head>
  <body>
    <div class="grid-container">
      <header th:replace="~{fragments/header :: header}"></header>
      <aside th:replace="~{fragments/aside :: aside}"></aside>
        <main class="main">
            <section class="home-hero-v3">
                <div class="hero-content">
                    <div class="hero-text-area">
                        <span class="hero-badge">Connect with People</span>
                        <h1>당신의 일상을 더 즐겁게 만드는<br> 새로운 연결, <span class="highlight">EnLink</span></h1>
                        <p>지금 내 주변에서 열리는 모임을 확인해보세요.</p>
                    </div>

                    <div class="hero-action-area">
                        <p class="tag-title">지금 많이 찾는 주제</p>
                        <div class="popular-tags">
                            <a th:href="@{/club/list(topicId=1)}">#러닝</a>
                            <a th:href="@{/club/list(topicId=2)}">#독서모임</a>
                            <a th:href="@{/club/list(topicId=3)}">#맛집</a>
                            <a th:href="@{/club/list(topicId=7)}">#롤</a>
                        </div>
                    </div>
                </div>
            </section>

            <div class="home-container">
                <section class="club-list-section new-clubs">
                    <div class="section-header">
                        <h2>🆕 새로 생겼어요!</h2>
                        <a th:href="@{/club/list(sort='createdAt,desc')}" class="view-all-link">전체보기 <i class="bi bi-chevron-right"></i></a>
                    </div>
                    <div class="home-grid-layout" id="newClubList"></div>

                    <div class="more-btn-container">
                        <button type="button" id="newClubMoreBtn" class="btn-home-more">신규 모임 더보기 <i class="bi bi-plus-lg"></i></button>
                    </div>
                </section>

                <section class="club-list-section recommended-clubs">
                    <div class="section-header">
                        <h2>✨ 이런 모임은 어떠세요?</h2>
                    </div>
                    <div class="home-grid-layout" id="clubList">
                    </div>

                    <div class="more-btn-container">
                        <button type="button" id="clubListMore" class="btn-home-more">추천 모임 더보기 <i class="bi bi-plus-lg"></i></button>
                    </div>
                </section>
            </div>
            <footer th:replace="~{fragments/footer :: footer}"></footer>
        </main>
    </div>
  </body>
</html>
