<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments/head :: head('HOME', ~{::link}, ~{::script})}">
    <link rel="stylesheet" th:href="@{/css/search-select.css}" />
    <link rel="stylesheet" th:href="@{/css/card-layout.css}" />
    <link rel="stylesheet" th:href="@{/css/home.css}" />
    <script type="module" th:src="@{/js/club/list/club-list.js}"></script>
  </head>
  <body>
    <div class="grid-container">
      <header th:replace="~{fragments/header :: header}"></header>
      <aside th:replace="~{fragments/aside :: aside}"></aside>
        <main class="main">
            <section class="home-hero-v3">
                <div class="hero-content">
                    <div class="hero-text-area">
                        <span class="hero-badge">Connect with People</span>
                        <h1 th:utext="#{home.hero.title}">당신의 일상을 더 즐겁게 만드는<br> 새로운 연결, EnLink</h1>
                        <p th:text="#{home.hero.subtitle}">지금 내 주변에서 열리는 모임을 확인해보세요.</p>
                    </div>

                    <div class="hero-action-area">
                        <p class="tag-title" th:text="#{home.hero.tag.title}">지금 많이 찾는 주제</p>
                        <div class="popular-tags" th:with="targetIds=${ {1, 2, 3, 7} }"><!--/* 여기 작성된 id를 랜더링함 */-->
                            <th:block th:each="topic : ${topics}" th:if="${#lists.contains(targetIds, topic.topicId)}">
                                <a th:href="@{/club/list(topicId=${topic.topicId})}"
                                th:text="${'#' + topic.name}">#주제명</a>
                            </th:block>
                        </div>
                    </div>
                </div>
            </section>

            <div class="home-container">
                <section class="club-list-section new-clubs">
                    <div class="section-header">
                        <h2 th:text="#{home.section.new.title}">🆕 새로 생겼어요!</h2>
                        <a th:href="@{/club/list(sort='createdAt,desc')}" class="view-all-link" th:text="#{home.section.new.viewAll}">전체보기 <i class="bi bi-chevron-right"></i></a>
                    </div>
                    <div class="home-grid-layout" id="newClubList"></div>

                    <div class="more-btn-container">
                        <button type="button" id="newClubMoreBtn" class="btn-home-more" th:text="#{home.section.new.more}">
                            <span th:remove="tag" th:text="#{home.section.new.more}">신규 모임 더보기 </span>
                            <i class="bi bi-plus-lg"></i>
                        </button>
                    </div>
                </section>

                <section class="club-list-section recommended-clubs">
                    <div class="section-header">
                        <h2 th:text="#{home.section.recommend.title}">✨ 이런 모임은 어떠세요?</h2>
                    </div>
                    <div class="home-grid-layout" id="clubList">
                    </div>

                    <div class="more-btn-container">
                        <button type="button" id="clubListMore" class="btn-home-more">
                            <span th:remove="tag" th:text="#{home.section.recommend.more}">추천 모임 더보기</span>
                            <i class="bi bi-plus-lg"></i>
                        </button>
                    </div>
                </section>
            </div>
            <footer th:replace="~{fragments/footer :: footer}"></footer>
        </main>
    </div>
  </body>
</html>
