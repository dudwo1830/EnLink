<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments/head :: head('Interest', ~{::link}, ~{::script})}">
    <!--/* link 태그와 script가 없을 경우 에러가 발생함 */-->
    <!--/* link, script를 별도로 사용하지 않을 경우 이걸 남겨둘 것 */-->
    <link rel="stylesheet" th:href="@{/css/search-select.css}" />
    <script th:src="@{/js/member/memberCommon.js}" defer></script>
    <script th:src="@{/js/common/search-select.js}" defer></script>
    <script th:src="@{/js/member/interest.js}" defer></script>
  </head>
  <body>
    <div class="grid-container">
      <header th:replace="~{fragments/header :: header}"></header>
      <aside th:replace="~{fragments/aside :: aside}"></aside>
      <main class="main container py-5">
        <div class="row justify-content-center">
          <div class="col-md-8 col-lg-7">
            <h2 class="section-title text-center mb-4" th:text="#{member.interest.title}">관심사 설정</h2>

            <div class="card shadow-sm mb-4">
              <div class="card-body p-4">
                <h3 class="mb-3 text-primary">
                  <i class="bi bi-hash me-2"></i><span th:text="#{member.interest.subtitle.topic}">관심 주제</span>
                </h3>
                <p class="text-muted small mb-3" th:text="#{member.interest.desc.topic}">
                  관심 있는 주제를 선택해 주세요.
                </p>

                <div id="topicTarget" class="mb-4"></div>

                <div class="text-end">
                  <button
                    type="button"
                    id="topicUpdateBtn"
                    class="btn btn-primary px-4"
                    th:text="#{member.interest.btn.saveTopic}">
                    관심 주제 저장
                  </button>
                </div>
              </div>
            </div>

            <div class="card shadow-sm">
              <div class="card-body p-4">
                <h3 class="mb-3 text-primary">
                  <i class="bi bi-geo-alt me-2"></i><span th:text="#{member.interest.subtitle.city}">관심 지역</span>
                </h3>

                <div class="alert alert-light border d-flex justify-content-between align-items-center mb-4">
                  <span class="text-muted" th:text="#{member.interest.label.currentCity}">현재 설정된 지역:</span>
                  <strong id="currentCity" class="text-primary">-</strong>
                </div>

                <div class="mb-3">
                  <label class="form-label fw-bold text-muted" th:text="#{member.interest.label.region}"
                    >지역 선택 (시/도)</label
                  >
                  <div class="select-search regions position-relative" data-name="regionId">
                    <input
                      type="text"
                      class="form-control select-input"
                      autocomplete="off"
                      th:placeholder="#{member.interest.placeholder.region}" />
                    <input type="hidden" class="select-hidden" />
                    <ul
                      class="select-options list-group position-absolute w-100 shadow-sm d-none"
                      style="z-index: 1000; max-height: 200px; overflow-y: auto"></ul>
                  </div>
                </div>

                <div class="mb-4">
                  <label class="form-label fw-bold text-muted" th:text="#{member.interest.label.city}"
                    >도시 선택 (구/군)</label
                  >
                  <div class="select-search cities position-relative" data-name="cityId">
                    <input
                      type="text"
                      class="form-control select-input"
                      autocomplete="off"
                      th:placeholder="#{member.interest.placeholder.city}" />
                    <input type="hidden" class="select-hidden" />
                    <ul
                      class="select-options list-group position-absolute w-100 shadow-sm d-none"
                      style="z-index: 1000; max-height: 200px; overflow-y: auto"></ul>
                  </div>
                </div>

                <div class="text-end">
                  <button
                    type="button"
                    id="cityUpdateBtn"
                    class="btn btn-primary px-4"
                    th:text="#{member.interest.btn.saveCity}">
                    관심 지역 저장
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
      <footer th:replace="~{fragments/footer :: footer}"></footer>
    </div>
  </body>
</html>
